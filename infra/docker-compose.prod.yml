services:
  meilisearch:
    image: getmeili/meilisearch:v1.13
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data

  food-api:
    build:
      context: ..
      dockerfile: services/food-api/Dockerfile
    restart: unless-stopped
    depends_on:
      - meilisearch
    environment:
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      MEILI_URL: ${MEILI_URL:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_INDEX_NAME: ${MEILI_INDEX_NAME:-foods}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      MAX_SEED_UPLOAD_MB: ${MAX_SEED_UPLOAD_MB:-100}
      MEILI_AUTO_SEED: ${MEILI_AUTO_SEED:-true}
      MEILI_SEED_FILE: ${MEILI_SEED_FILE:-/data/seeds/foods.json}
      MEILI_SEED_FALLBACK_FILE: ${MEILI_SEED_FALLBACK_FILE:-data/seed/foods.de.sample.json}
      FOOD_API_KEY: ${FOOD_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      VISION_TIMEOUT_MS: ${VISION_TIMEOUT_MS:-25000}
      VISION_MAX_IMAGE_MB: ${VISION_MAX_IMAGE_MB:-4}
    volumes:
      - seed_data:/data/seeds

volumes:
  meili_data:
  seed_data:
