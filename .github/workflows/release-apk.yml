name: Release APK

on:
  release:
    # GitHub can emit different release actions depending on how a release
    # was created/published in UI or CLI.
    types: [published, released, prereleased]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach APK to (e.g. v0.6.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-attach-apk:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Debug release event context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_action=${{ github.event.action }}"
          echo "release_tag=${{ github.event.release.tag_name || inputs.tag }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Android signing keystore
        working-directory: ./apps/android/app
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          test -s release.keystore
          ls -l release.keystore

      - name: Create Android local.properties
        working-directory: ./apps/android
        run: |
          {
            echo "sdk.dir=$ANDROID_SDK_ROOT"
            echo "FOOD_API_BASE_URL=${{ secrets.FOOD_API_BASE_URL }}"
            echo "FOOD_API_KEY=${{ secrets.FOOD_API_KEY }}"
            echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/apps/android/app/release.keystore"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}"
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}"
          } > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./apps/android/gradlew

      - name: Build release APK
        working-directory: ./apps/android
        run: ./gradlew :app:assembleRelease

      - name: Upload APK(s) to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: apps/android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
