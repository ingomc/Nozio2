name: Release APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-attach-apk:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Android local.properties
        working-directory: ./apps/android
        run: |
          {
            echo "sdk.dir=$ANDROID_SDK_ROOT"
            echo "FOOD_API_BASE_URL=${{ secrets.FOOD_API_BASE_URL }}"
            echo "FOOD_API_KEY=${{ secrets.FOOD_API_KEY }}"
          } > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./apps/android/gradlew

      - name: Build release APK (unsigned)
        working-directory: ./apps/android
        run: ./gradlew :app:assembleRelease

      - name: Upload APK(s) to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
